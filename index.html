    .btn-primary {

      border: none; border-radius: 14px; cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      transition: opacity 0.12s, transform 0.1s; user-select: none; letter-spacing: 0.01em;
    }
    .btn-primary:active  { opacity: 0.85; transform: scale(0.985); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent; color: #1A1918; font-weight: 500; font-size: 0.95rem;
      border: none; cursor: pointer; font-family: 'Cormorant Garamond', serif;
      transition: opacity 0.12s; user-select: none; text-align: center;
    }
    .btn-ghost:active { opacity: 0.6; }

    .option-btn {
      background: rgba(255,255,255,0.88); color: #1A1918; font-weight: 500;
      border: 1.5px solid transparent; border-radius: 16px;
      box-shadow: 0 1px 10px rgba(0,0,0,0.07); cursor: pointer;
      transition: box-shadow 0.12s, transform 0.1s;
      user-select: none; text-align: left; width: 100%;
      font-family: 'Cormorant Garamond', serif;
    }
    .option-btn:active { transform: scale(0.985); }

    .card {
      background: rgba(255,255,255,0.88);
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    /* Content column — narrow on mobile, wider on desktop */
    .col {
      width: 100%;
      max-width: min(580px, calc(100vw - 40px));
      margin: 0 auto;
    }

    input:focus { outline: none; }
    input::placeholder { color: rgba(26,25,24,0.32); }
    ::-webkit-scrollbar { display: none; }

    @keyframes slide-up {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin     { to   { transform: rotate(360deg); } }
    @keyframes decoIn   {
      from { opacity: 0; transform: scale(0.86); }
      to   { opacity: 1; transform: scale(1);    }
    }

    .anim-up   { animation: slide-up 0.3s cubic-bezier(0.22,1,0.36,1); }
    .anim-fade { animation: fade-in 0.25s ease-out; }

    /* CSS cloud */
    .nod-cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      box-shadow: 0 6px 24px rgba(180,200,230,0.25);
    }
    .nod-cloud::before, .nod-cloud::after {
      content: ''; position: absolute; background: white; border-radius: 50%;
    }
    .nod-cloud::before { width: 58%; height: 170%; top: -55%; left: 14%; }
    .nod-cloud::after  { width: 44%; height: 135%; top: -32%; right: 14%; }
  </style>

  // Deco — animates in with random delay + random rotation variance each mount
  function Deco({ src, style = {}, opacity = 0.13, rotate = 0, flip = false }) {
    // New random values every time this screen mounts
    const [delay]  = useState(() => +(Math.random() * 0.55).toFixed(2))
    const [rotVar] = useState(() => +((Math.random() - 0.5) * 14).toFixed(1))

    // Position/layout props go on the animated wrapper div
    // Size constraints go on the img so aspect-ratio scaling works correctly
    const { maxWidth, maxHeight, width, height, ...wrapStyle } = style

    return (
      <div style={{
        position:'absolute', pointerEvents:'none', userSelect:'none',
        animation:`decoIn 1s cubic-bezier(0.22,1,0.36,1) ${delay}s both`,
        ...wrapStyle,
      }}>
        <img src={src} alt="" aria-hidden="true" style={{
          display:'block',
          opacity, mixBlendMode:'multiply',
          transform:`rotate(${rotate + rotVar}deg) scaleX(${flip ? -1 : 1})`,
          maxWidth, maxHeight,
          ...(width  ? { width  } : {}),
          ...(height ? { height } : {}),
        }} />
      </div>
    )
  }

  function shuffle(arr) {
    const a = [...arr]
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]]
    }
    return a
  }
  const todayStr = () => new Date().toISOString().slice(0,10)
  function timeToMidnight() {
    const now = new Date(), mid = new Date(now)
    mid.setHours(24,0,0,0)
    const d = mid - now
    return `${Math.floor(d/3600000)}:${String(Math.floor((d%3600000)/60000)).padStart(2,'0')}:${String(Math.floor((d%60000)/1000)).padStart(2,'0')}`
  }

  async function dbFetchTerms() {
    if (!db) return null
    const { data, error } = await db.from('terms').select('*')
    if (error) { console.error('[NOD]', error); return null }
    return data
  }
  async function dbUpsertPlayer(name) {
    if (!db) return null
    const { data: ex } = await db.from('players').select('*').ilike('name', name).limit(1).single()
    if (ex) return ex
    const { data, error } = await db.from('players').insert({ name }).select().single()
    if (error) { console.error('[NOD]', error); return null }
    return data
  }
  async function dbSaveResult({ playerId, scoreGained, maxStreak }) {
    if (!db || !playerId) return
    const { data: p, error: selErr } = await db.from('players').select('score,max_streak,games_played').eq('id', playerId).single()
    if (selErr) { console.error('[NOD] dbSaveResult SELECT error:', selErr.message, selErr); return }
    if (!p) return
    const ng = p.games_played + 1
    const { error: updErr } = await db.from('players').update({ score: p.score+scoreGained, max_streak: Math.max(p.max_streak, maxStreak), games_played: ng, updated_at: new Date().toISOString() }).eq('id', playerId)
    if (updErr) { console.error('[NOD] dbSaveResult UPDATE error:', updErr.message, updErr); return }
    await db.from('game_sessions').insert({ player_id: playerId, game_number: ng, score: scoreGained })
  }
  async function dbFetchLeaderboard() {
    if (!db) return null
    const { data, error } = await db.from('players').select('id,name,score,max_streak,games_played').order('score', { ascending:false }).limit(10)
    if (error) { console.error('[NOD] leaderboard fetch error:', error.message, error); return null }
    return data
  }
  function dbSubscribeLb(cb) {
    if (!db) return () => {}
    const ch = db.channel('lb').on('postgres_changes', { event:'*', schema:'public', table:'players' }, async () => { const d = await dbFetchLeaderboard(); if (d) cb(d) }).subscribe()
    return () => db.removeChannel(ch)
  }

      <p style={{ fontSize:'clamp(1.05rem,2.5vw,1.3rem)', fontWeight:500, color:'#1A1918', lineHeight:1.55, margin:0 }}>
        {parts[0]}
        <span style={{ display:'inline-block', width:80, borderBottom:'2px solid #1A1918', margin:'0 4px 3px', verticalAlign:'bottom' }} />
        {parts[1]}
      </p>
    )
  }

  function ClozeReveal({ cloze, term, isCorrect }) {
    const parts = cloze.includes('. . . . . . .') ? cloze.split('. . . . . . .') : cloze.split('_____')
    const c = isCorrect ? '#2A8A52' : '#B03030'
    return (
      <p style={{ fontSize:'clamp(1rem,2.2vw,1.15rem)', fontWeight:400, color:'#1A1918', lineHeight:1.55, margin:0 }}>
        {parts[0]}
        <span style={{ display:'inline', background: isCorrect ? 'rgba(42,138,82,0.13)' : 'rgba(176,48,48,0.13)', color:c, borderRadius:6, padding:'0 7px', fontWeight:600, fontStyle:'italic' }}>{term}</span>
        {parts[1]}
      </p>
    )
  }

  // ══════════════════════════════════════════
  // LEADERBOARD
  // ══════════════════════════════════════════
  const BALL = [
    { bg:'radial-gradient(circle at 35% 32%,#FFE880,#F5B800 58%,#C88000 100%)', sh:'rgba(245,184,0,0.4)' },
    { bg:'radial-gradient(circle at 35% 32%,#A0E0B0,#3DB870 58%,#208050 100%)', sh:'rgba(61,184,112,0.4)' },
    { bg:'radial-gradient(circle at 35% 32%,#FFCCAA,#C87848 58%,#904828 100%)', sh:'rgba(200,120,72,0.4)' },
  ]

  function LeaderboardScreen({ playerId, playerName, onPlayAgain }) {
    const [leaders, setLeaders] = useState([])
    const [loading, setLoading] = useState(true)
    const [fetchError, setFetchError] = useState(null)
    useEffect(() => {
      let unsub = () => {}
      let cancelled = false
      dbFetchLeaderboard().then(d => {
        if (cancelled) return
        if (d === null) setFetchError('Could not load scores.')
        setLeaders(d ?? [])
        setLoading(false)
        if (d !== null) unsub = dbSubscribeLb(cb => { if (!cancelled) setLeaders(cb) })
      })
      return () => { cancelled = true; unsub() }
    }, [])

    const top3  = leaders.slice(0,3)
    const month = new Date().toLocaleString('default', { month:'long', year:'numeric' })

    // Podium order: 2nd | 1st | 3rd
    const podium = [1, 0, 2]
    const bSize  = ['clamp(55px,8vw,90px)', 'clamp(70px,10vw,110px)', 'clamp(50px,7vw,80px)']
    const pH     = ['clamp(70px,10vw,110px)', 'clamp(100px,14vw,150px)', 'clamp(55px,8vw,90px)']

    return (
      <Screen decos={<>
        {/* Leaderboard — Right: thunder(top:0) + cat(bottom:22%) → gap 10dvh | Left: swordfish alone */}
        <Deco src={E.thunder}   style={{ top:0,        right:0, maxWidth:'clamp(190px,28vw,500px)', maxHeight:'34dvh' }} opacity={0.11} rotate={10} />
        <Deco src={E.swordfish} style={{ bottom:0,     left:0,  maxWidth:'clamp(240px,36vw,620px)', maxHeight:'55dvh' }} opacity={0.12} rotate={-5} />
        <Deco src={E.cat}       style={{ bottom:'22%', right:0, maxWidth:'clamp(80px,11vw,220px)',  maxHeight:'34dvh' }} opacity={0.09} rotate={15} />
      </>}>
        <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(26,25,24,0.4)', marginBottom:4, marginTop:0 }}>
          {month.toUpperCase()} · TOP {Math.min(leaders.length,3)}
        </p>
        <h2 style={{ fontFamily:'"Cormorant Garamond",serif', fontStyle:'italic', fontWeight:300, fontSize:'clamp(2rem,5vw,3rem)', color:'#1A1918', margin:'0 0 24px', lineHeight:1.1 }}>
          This month's<br/>sharpest nods.
        </h2>

        {!loading && top3.length >= 1 && (
          <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'center', gap:'clamp(8px,2vw,20px)', marginBottom:20 }}>
            {podium.map((rank, posIdx) => {
              const p = top3[rank]
              if (!p) return <div key={rank} style={{ width:bSize[posIdx] }} />
              const isMe = p.id === playerId || p.name?.toLowerCase() === playerName?.toLowerCase()
              return (
                <div key={rank} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
                  <span style={{ fontSize:'0.78rem', fontWeight:600, fontStyle:'italic', color:'#1A1918' }}>{p.name}{isMe?' · you':''}</span>
                  <div style={{ width:bSize[posIdx], height:bSize[posIdx], borderRadius:'50%', background:BALL[rank].bg, boxShadow:`0 8px 24px ${BALL[rank].sh}` }} />
                  <span style={{ fontWeight:700, fontSize:'clamp(0.9rem,2vw,1.1rem)', color:'#1A1918' }}>{p.score}</span>
                  <div style={{ width:'100%', height:pH[posIdx], background:'rgba(255,255,255,0.75)', borderRadius:'10px 10px 0 0', display:'flex', alignItems:'flex-start', justifyContent:'center', paddingTop:8 }}>
                    <span style={{ fontSize:'1.1rem' }}>{rank===0?'🥇':rank===1?'🥈':'🥉'}</span>
                  </div>
                </div>
              )
            })}
          </div>
        )}
        {loading && <p style={{ textAlign:'center', color:'rgba(26,25,24,0.4)', fontSize:'0.9rem', marginBottom:20 }}>Loading…</p>}
        {!loading && fetchError && (
          <div style={{ background:'rgba(255,255,255,0.75)', borderRadius:16, padding:'14px 16px', marginBottom:16, textAlign:'center' }}>
            <p style={{ margin:0, fontSize:'0.9rem', color:'#C84040', fontStyle:'italic' }}>Scores unavailable — check the browser console for details.</p>
          </div>
        )}

        <div style={{ background:'rgba(255,255,255,0.7)', borderRadius:16, padding:'12px 14px', marginBottom:16 }}>
          <p style={{ fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#8A8A88', margin:'0 0 2px' }}>Playing</p>
          <p style={{ fontWeight:600, fontSize:'clamp(0.95rem,2.2vw,1.1rem)', color:'#1A1918', margin:0 }}>{leaders.length} teammates</p>
        </div>

        <button onClick={onPlayAgain} className="btn-primary" style={{ width:'100%', padding:'16px', fontSize:'1.05rem' }}>
          Play today's nod
        </button>
      </Screen>
    )
  }

  // ══════════════════════════════════════════
  // LIBRARY
  // ══════════════════════════════════════════
  function LibraryScreen({ onBack }) {
    const [terms,   setTerms]   = useState([])
    const [filter,  setFilter]  = useState('All')
    const [loading, setLoading] = useState(true)
    useEffect(() => { dbFetchTerms().then(d => { setTerms(d ?? FALLBACK_TERMS); setLoading(false) }) }, [])

    const depts   = ['All', ...Array.from(new Set(terms.map(t => t.department))).sort()]
    const visible = filter === 'All' ? terms : terms.filter(t => t.department === filter)

    return (
      <Screen style={{ overflow:'hidden' }} decos={<>
        {/* Library — Right: flower(top:8%) + octopus(bottom:0) → gap 20dvh | Left: mantis alone */}
        <Deco src={E.octopus} style={{ bottom:0,  right:0, maxWidth:'clamp(220px,32vw,560px)', maxHeight:'50dvh' }} opacity={0.12} rotate={-10} />
        <Deco src={E.mantis}  style={{ top:'8%',  left:0,  maxWidth:'clamp(160px,24vw,440px)', maxHeight:'55dvh' }} opacity={0.10} rotate={20}  />
        <Deco src={E.flower}  style={{ top:'8%',  right:0, maxWidth:'clamp(65px,9vw,180px)',   maxHeight:'22dvh' }} opacity={0.08} rotate={-8}  />
      </>}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontSize:'0.85rem', color:'rgba(26,25,24,0.45)', textAlign:'left', marginBottom:12, padding:0 }}>← Back</button>
        <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(26,25,24,0.4)', marginBottom:4, marginTop:0 }}>Your Glossary · {terms.length} terms</p>
        <h2 style={{ fontFamily:'"Cormorant Garamond",serif', fontStyle:'italic', fontWeight:300, fontSize:'clamp(2.2rem,5vw,3rem)', color:'#1A1918', margin:'0 0 16px', lineHeight:1 }}>Words,<br/>collected.</h2>

        <div style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:12, flexShrink:0 }}>
          {depts.map(d => {
            const dept = getDept(d), active = filter === d
            return (
              <button key={d} onClick={() => setFilter(d)} style={{ flexShrink:0, padding:'6px 14px', borderRadius:100, background: active ? '#1A1918' : 'rgba(255,255,255,0.8)', color: active ? '#fff' : '#1A1918', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, fontSize:'0.8rem', display:'flex', alignItems:'center', gap:6 }}>
                {d !== 'All' && <span style={{ width:8, height:8, borderRadius:'50%', background:dept.dot, display:'inline-block' }} />}
                {d === 'All' ? `All ${terms.length}` : `${d.split(/[\s-]/)[0]} ${terms.filter(t=>t.department===d).length}`}
              </button>
            )
          })}
        </div>

        <div style={{ flex:1, overflowY:'auto', paddingBottom:20 }}>
          {loading ? <p style={{ textAlign:'center', color:'rgba(26,25,24,0.4)', fontSize:'0.9rem', marginTop:40 }}>Loading…</p> : visible.map(t => {
            const dept = getDept(t.department)
            return (
              <div key={t.id || t.term} style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'14px 4px', borderBottom:'1px solid rgba(0,0,0,0.06)' }}>
                <div style={{ width:12, height:12, borderRadius:'50%', background:dept.dot, flexShrink:0, marginTop:5 }} />
                <div>
                  <p style={{ fontWeight:600, fontStyle:'italic', fontSize:'1rem', color:'#1A1918', margin:'0 0 3px' }}>{t.term}</p>
                  <p style={{ fontSize:'0.82rem', color:'rgba(26,25,24,0.55)', margin:0, lineHeight:1.45 }}>{t.definition || t.explanation}</p>
                </div>
              </div>
            )
          })}
        </div>
      </Screen>
    )
  }

  // ══════════════════════════════════════════
  // PROFILE
  // ══════════════════════════════════════════
  function ProfileScreen({ playerId, playerName, playerDept, onBack }) {
    const [stats, setStats] = useState(null)
    useEffect(() => {
      if (!db || !playerId) return
      db.from('players').select('*').eq('id', playerId).single().then(({ data }) => setStats(data))
    }, [playerId])
    const dept     = getDept(playerDept)
    const accuracy = stats ? Math.round(((stats.score / PTS_CORRECT) / Math.max(stats.games_played * QUESTIONS_PER_GAME, 1)) * 100) : 0
    const since    = new Date().toLocaleString('default', { month:'long', year:'numeric' })
    return (
      <Screen decos={<>
        {/* Profile — Right: lizard(top:5%) + mammoth(bottom:0) → gap 13dvh | Left: boat alone */}
        <Deco src={E.mammoth} style={{ bottom:0,    right:0, maxWidth:'clamp(260px,38vw,640px)', maxHeight:'50dvh' }} opacity={0.12} rotate={-8}  />
        <Deco src={E.lizard}  style={{ top:'5%',    right:0, maxWidth:'clamp(120px,18vw,340px)', maxHeight:'32dvh' }} opacity={0.10} rotate={20}  />
        <Deco src={E.boat}    style={{ bottom:'28%',left:0,  maxWidth:'clamp(110px,16vw,300px)', maxHeight:'55dvh' }} opacity={0.09} rotate={10}  />
      </>}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontSize:'0.85rem', color:'rgba(26,25,24,0.45)', textAlign:'left', marginBottom:20, padding:0 }}>← Back</button>

        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:20 }}>
          <div style={{ width:'clamp(60px,10vw,90px)', height:'clamp(60px,10vw,90px)', borderRadius:'50%', background:`radial-gradient(circle at 35% 32%,${dept.dot}CC,${dept.color} 70%)`, boxShadow:`0 8px 28px ${dept.dot}66`, marginBottom:12 }} />
          <h2 style={{ fontFamily:'"Cormorant Garamond",serif', fontStyle:'italic', fontWeight:400, fontSize:'clamp(1.8rem,4vw,2.4rem)', color:'#1A1918', margin:'0 0 4px' }}>{playerName}</h2>
          <p style={{ fontSize:'0.82rem', color:'rgba(26,25,24,0.5)', margin:0 }}>{playerDept || 'No discipline'} · since {since}</p>
        </div>

        {stats ? (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14 }}>
            {[{ val:stats.score, label:'Total Points' }, { val:stats.games_played, label:'Days Played' }, { val:stats.max_streak, label:'Best Streak' }, { val:`${accuracy}%`, label:'Accuracy' }].map(({ val, label }) => (
              <div key={label} style={{ background:'rgba(255,255,255,0.78)', borderRadius:18, padding:'16px 18px', boxShadow:'0 2px 12px rgba(0,0,0,0.06)' }}>
                <p style={{ fontWeight:600, fontSize:'clamp(1.4rem,3.5vw,2rem)', color:'#1A1918', margin:'0 0 2px' }}>{val}</p>
                <p style={{ fontSize:'0.68rem', fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#8A8A88', margin:0 }}>{label}</p>
              </div>
            ))}
          </div>
        ) : <p style={{ textAlign:'center', color:'rgba(26,25,24,0.4)', fontSize:'0.9rem' }}>Loading…</p>}

        <div style={{ background:'rgba(255,255,255,0.75)', borderRadius:20, padding:'18px 20px', marginBottom:16 }}>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:'#8A8A88', margin:'0 0 12px' }}>Achievements</p>
          <div style={{ display:'flex', gap:18 }}>
            {[{ e:'🔥', l:'Streak', ok: stats && stats.max_streak >= 3 }, { e:'🏆', l:'Top scorer', ok: false }, { e:'📚', l:'10 games', ok: stats && stats.games_played >= 10 }, { e:'🎯', l:'Sharp', ok: stats && accuracy >= 90 }].map(({ e, l, ok }) => (
              <div key={l} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, opacity: ok ? 1 : 0.3 }}>
                <span style={{ fontSize:'1.5rem' }}>{e}</span>
                <span style={{ fontSize:'0.58rem', fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'#8A8A88' }}>{l}</span>
              </div>
            ))}
          </div>
        </div>

        <button onClick={onBack} className="btn-primary" style={{ width:'100%', padding:'16px', fontSize:'1.05rem', marginTop:'auto' }}>Play today's nod</button>
      </Screen>
    )
  }

  // ══════════════════════════════════════════
  // DAILY DONE
  // ══════════════════════════════════════════
  function DailyDoneScreen({ streak, onLeaderboard, onLibrary }) {
    const [countdown, setCountdown] = useState(timeToMidnight())
    useEffect(() => { const t = setInterval(() => setCountdown(timeToMidnight()), 1000); return () => clearInterval(t) }, [])
    return (
      <Screen decos={<>
        {/* DailyDone — Right: thunder(top:0) + star(bottom:28%) → gap 10dvh | Left: lizard(top:14%) + mountain(bottom:0) → gap 11dvh */}
        <Deco src={E.thunder}  style={{ top:0,        right:0, maxWidth:'clamp(200px,30vw,520px)', maxHeight:'30dvh' }} opacity={0.13} rotate={15}  />
        <Deco src={E.mountain} style={{ bottom:0,     left:0,  maxWidth:'clamp(280px,40vw,680px)', maxHeight:'50dvh' }} opacity={0.12} rotate={-5}  />
        <Deco src={E.star}     style={{ bottom:'28%', right:0, maxWidth:'clamp(110px,17vw,320px)', maxHeight:'32dvh' }} opacity={0.10} rotate={30}  />
        <Deco src={E.lizard}   style={{ top:'14%',    left:0,  maxWidth:'clamp(70px,10vw,200px)',  maxHeight:'25dvh' }} opacity={0.08} rotate={10}  />
      </>}>
        <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(26,25,24,0.4)', marginBottom:12, marginTop:0 }}>Complete · Well done!</p>
        <h2 style={{ fontFamily:'"Cormorant Garamond",serif', fontStyle:'italic', fontWeight:300, fontSize:'clamp(2.8rem,7vw,4.5rem)', color:'#1A1918', margin:'0 0 28px', lineHeight:1.05 }}>
          See you<br/>tomorrow.
        </h2>

        <div className="card" style={{ padding:'20px 22px', marginBottom:12, textAlign:'center' }}>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:'#8A8A88', margin:'0 0 8px' }}>Next nod in</p>
          <p style={{ fontFamily:'monospace', fontWeight:700, fontSize:'clamp(1.8rem,5vw,2.6rem)', color:'#1A1918', margin:'0 0 4px', letterSpacing:'0.05em' }}>{countdown}</p>
          <p style={{ fontSize:'0.78rem', color:'rgba(26,25,24,0.4)', margin:0 }}>Midnight, your time.</p>
        </div>

        {streak > 0 && (
          <div style={{ background:'rgba(255,247,214,0.88)', borderRadius:20, padding:'18px 20px', marginBottom:'auto', textAlign:'center' }}>
            <span style={{ fontSize:'2rem', display:'block', marginBottom:6 }}>🔥</span>
            <p style={{ fontWeight:700, fontSize:'clamp(1rem,2.5vw,1.2rem)', color:'#1A1918', margin:'0 0 4px' }}>{streak}-day streak</p>
            <p style={{ fontSize:'0.82rem', color:'rgba(26,25,24,0.5)', margin:0 }}>Don't break it.</p>
          </div>
        )}

        <div style={{ display:'flex', flexDirection:'column', gap:10, marginTop:24 }}>
          <button onClick={onLeaderboard} className="btn-primary" style={{ width:'100%', padding:'16px', fontSize:'1.05rem' }}>See the leaderboard</button>
          <button onClick={onLibrary}     className="btn-ghost"   style={{ width:'100%', padding:'12px', fontSize:'1rem'   }}>Browse the glossary</button>
        </div>
      </Screen>
    )
  }

  // ══════════════════════════════════════════
  // APP
  // ══════════════════════════════════════════
  function App() {
    const [screen,         setScreen]         = useState('start')
    const [playerName,     setPlayerName]     = useState('')
    const [playerDept,     setPlayerDept]     = useState(null)
    const [playerId,       setPlayerId]       = useState(null)
    const [questions,      setQuestions]      = useState([])
    const [currentIndex,   setCurrentIndex]   = useState(0)
    const [selectedAnswer, setSelectedAnswer] = useState(null)
    const [isCorrect,      setIsCorrect]      = useState(null)
    const [score,          setScore]          = useState(0)
    const [streak,         setStreak]         = useState(0)
    const [maxStreak,      setMaxStreak]      = useState(0)
    const [loading,        setLoading]        = useState(false)
    const [gamesPlayed,    setGamesPlayed]    = useState(0)
    const [dayStreak,      setDayStreak]      = useState(0)
    const pendingName = React.useRef('')  // holds the name being processed, avoids stale closure in discipline

    const handleNameSubmit = useCallback(async (name) => {
      setLoading(true)
      setPlayerName(name)
      pendingName.current = name          // store for discipline screen
      const key = name.toLowerCase()

      let resolvedId = null
      try { const d = JSON.parse(localStorage.getItem('nod_players') || '{}'); if (d[key]) resolvedId = d[key] } catch {}
      if (!resolvedId) {
        const p = await dbUpsertPlayer(name)
        if (p) resolvedId = p.id
      }
      if (resolvedId) {
        setPlayerId(resolvedId)
        try {
          const d = JSON.parse(localStorage.getItem('nod_players') || '{}')
          d[key] = resolvedId
          localStorage.setItem('nod_players', JSON.stringify(d))
          localStorage.setItem('nod_last_name', name)
        } catch {}
        if (db) {
          const { data } = await db.from('players').select('games_played').eq('id', resolvedId).single()
          if (data) setGamesPlayed(data.games_played || 0)
        }
      }

      try {
        if (localStorage.getItem(`nod_played_${key}`) === todayStr()) {
          setDayStreak(parseInt(localStorage.getItem(`nod_streak_${key}`) || '1'))
          setLoading(false); setScreen('daily_done'); return
        }
      } catch {}

      let savedDept = null
      try { savedDept = localStorage.getItem(`nod_dept_${key}`) || null } catch {}
      setLoading(false)
      if (savedDept) { setPlayerDept(savedDept); await startGame(name, resolvedId, savedDept) }
      else setScreen('discipline')
    }, [])

    const handleDisciplineSelect = useCallback(async (dept) => {
      const name = pendingName.current || playerName   // use ref first — always correct
      setPlayerDept(dept)
      try { localStorage.setItem(`nod_dept_${name.toLowerCase()}`, dept) } catch {}
      await startGame(name, playerId, dept)
    }, [playerName, playerId])

    const startGame = useCallback(async (name, id, dept) => {
      setLoading(true)
      const all  = await dbFetchTerms() ?? FALLBACK_TERMS
      const pick = shuffle(all).slice(0, QUESTIONS_PER_GAME)
      setQuestions(pick)
      setCurrentIndex(0); setScore(0); setStreak(0); setMaxStreak(0)
      setSelectedAnswer(null); setIsCorrect(null)
      setLoading(false); setScreen('playing')
    }, [])

    const handleAnswer = useCallback((idx) => {
      const q       = questions[currentIndex]
      const correct = idx === q.correct_index
      const isCross = playerDept && q.department !== playerDept
      setSelectedAnswer(idx); setIsCorrect(correct)
      if (correct) {
        const ns = streak + 1
        setScore(s => s + PTS_CORRECT + (ns >= STREAK_BONUS_AT ? STREAK_BONUS : 0) + (isCross ? CROSS_BONUS : 0))
        setStreak(ns); setMaxStreak(m => Math.max(m, ns))
      } else { setStreak(0) }
      // Save term to player's local word collection (all answered terms, win or lose)
      try {
        const key   = (pendingName.current || playerName).toLowerCase()
        const termId = q.id || q.term
        const words  = JSON.parse(localStorage.getItem(`nod_words_${key}`) || '[]')
        if (!words.includes(termId)) { words.push(termId); localStorage.setItem(`nod_words_${key}`, JSON.stringify(words)) }
      } catch {}
      setScreen('feedback')
    }, [questions, currentIndex, streak, playerDept, playerName])

    const handleNext = useCallback(async () => {
      const next = currentIndex + 1
      if (next >= questions.length) {
        await dbSaveResult({ playerId, scoreGained:score, maxStreak })
        try {
          const key = (pendingName.current || playerName).toLowerCase()
          const today = todayStr()
          const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1)
          const yStr = yesterday.toISOString().slice(0, 10)
          const lastPlayed = localStorage.getItem(`nod_played_${key}`)
          // If they played yesterday → consecutive streak, else reset to 1
          const newStreak = lastPlayed === yStr
            ? parseInt(localStorage.getItem(`nod_streak_${key}`) || '0') + 1
            : 1
          localStorage.setItem(`nod_streak_${key}`, String(newStreak))
          localStorage.setItem(`nod_played_${key}`, today)
          setDayStreak(newStreak)
        } catch {}
        setScreen('summary')
      } else {
        setCurrentIndex(next); setSelectedAnswer(null); setIsCorrect(null); setScreen('playing')
      }
    }, [currentIndex, questions.length, playerId, score, maxStreak, playerName])

    const playAgain = useCallback(() => {
      const key = playerName.toLowerCase()
      try {
        if (localStorage.getItem(`nod_played_${key}`) === todayStr()) {
          setDayStreak(parseInt(localStorage.getItem(`nod_streak_${key}`) || '1'))
          setScreen('daily_done'); return
        }
      } catch {}
      const dept = playerDept || (() => { try { return localStorage.getItem(`nod_dept_${key}`) } catch { return null } })()
      startGame(playerName, playerId, dept)
    }, [playerName, playerId, playerDept, startGame])

    const q = questions[currentIndex]

    return (
      <div style={{ width:'100%', minHeight:'100dvh' }}>
        {screen === 'start'       && <StartScreen     onStart={handleNameSubmit} loading={loading} />}
        {screen === 'discipline'  && <DisciplineScreen onSelect={handleDisciplineSelect} />}
        {screen === 'playing'     && q && <ChallengeCard question={q} questionNumber={currentIndex+1} totalQuestions={QUESTIONS_PER_GAME} streak={streak} score={score} playerDept={playerDept} onAnswer={handleAnswer} />}
        {screen === 'feedback'    && q && <FeedbackScreen question={q} selectedAnswer={selectedAnswer} isCorrect={isCorrect} streak={streak} onNext={handleNext} isLast={currentIndex === questions.length-1} />}
        {screen === 'summary'     && <SummaryScreen    playerName={playerName} score={score} totalQuestions={QUESTIONS_PER_GAME} maxStreak={maxStreak} onLeaderboard={() => setScreen('leaderboard')} onPlayAgain={playAgain} onLibrary={() => setScreen('library')} />}
        {screen === 'leaderboard' && <LeaderboardScreen playerId={playerId} playerName={playerName} onPlayAgain={playAgain} />}
        {screen === 'library'     && <LibraryScreen    onBack={() => setScreen('summary')} />}
        {screen === 'profile'     && <ProfileScreen    playerId={playerId} playerName={playerName} playerDept={playerDept} onBack={() => setScreen('start')} />}
        {screen === 'daily_done'  && <DailyDoneScreen  streak={dayStreak} onLeaderboard={() => setScreen('leaderboard')} onLibrary={() => setScreen('library')} />}
        {loading && (
          <div style={{ position:'fixed', inset:0, background:'rgba(192,212,234,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:999 }}>
            <div style={{ width:36, height:36, border:'3px solid rgba(26,25,24,0.12)', borderTopColor:'#1A1918', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} />
          </div>
        )}
        <style>{`@keyframes spin { to { transform:rotate(360deg); } }`}</style>
      </div>
    )
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
